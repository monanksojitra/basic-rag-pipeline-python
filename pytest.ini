[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Filtering
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')

# Output
addopts = -v --tb=short

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(message)s